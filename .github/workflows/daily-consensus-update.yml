name: Daily Sharp Consensus Update

on:
  schedule:
    # Runs at 3:00 PM UTC (10:00 AM EST) - staggered to avoid collision with daily-sports-update
    # daily-sports-update runs at 13:00, 17:00, 23:00 UTC
    # This runs at 15:00 UTC (between the first two) for midday consensus refresh
    - cron: '0 15 * * *'
    # Evening consensus refresh at 21:00 UTC (4 PM EST) - 2 hours before the 23:00 sports update
    - cron: '0 21 * * *'
  workflow_dispatch:  # Allows manual trigger

concurrency:
  group: consensus-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-consensus:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run Sharp Consensus Update
        run: |
          python scripts/github_consensus_update.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Sharp Consensus update - $(date +'%A, %B %d, %Y')

          🤖 Auto-generated by GitHub Actions"
          # Pull with rebase - ABORT on conflict instead of pushing broken files
          for attempt in 1 2 3; do
            if git pull --rebase origin main; then
              git push && break
            else
              echo "Rebase conflict on attempt $attempt - aborting rebase and retrying"
              git rebase --abort
              sleep 10
            fi
          done
